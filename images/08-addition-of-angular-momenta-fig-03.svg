  <title id="fig-title-03">Ladder Operator Algorithm: Building |1,0⟩ from |1,1⟩</title>
  <desc>Four-step flowchart deriving the J=1, M=0 coupled state from the stretched state |1,1⟩=|↑↑⟩ via the lowering operator Ĵ₋ = Ĵ₁₋ + Ĵ₂₋. Each particle's spin is lowered independently to give |↓↑⟩ and |↑↓⟩; after normalization the result |1,0⟩=(|↑↓⟩+|↓↑⟩)/√2 is symmetric under particle exchange.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Quantum Mechanics: Formalism and the Three-Dimensional Atom"
      book-slug="quantum-mechanics-vol2"
      chapter="08-addition-of-angular-momenta"

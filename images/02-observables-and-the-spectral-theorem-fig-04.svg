  <line x1="460" y1="270" x2="460" y2="232" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
  <line x1="610" y1="215" x2="610" y2="228" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>


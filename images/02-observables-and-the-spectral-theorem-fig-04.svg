<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
  <title id="fig-title-04">Real vs. Complex Eigenvalues: Effect of Hermiticity</title>
  <desc>Two side-by-side panels. Left: real number line with three eigenvalue dots on the axis (Hermitian case — all eigenvalues real). Right: complex plane with three eigenvalue dots placed off the real axis (non-Hermitian case — eigenvalues may be complex). The contrast shows why Hermiticity guarantees observable real eigenvalues.</desc>

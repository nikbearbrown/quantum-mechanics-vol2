  <text x="350" y="408" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">Hermiticity forces all eigenvalues onto the real axis — a necessary condition for observable quantities.</text>

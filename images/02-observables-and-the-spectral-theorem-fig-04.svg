  <text x="214" y="252" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454" text-anchor="middle">λ<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan></text>
  <text x="270" y="252" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454" text-anchor="middle">λ<tspan dy="0.3em" font-size="0.75em">3</tspan><tspan dy="-0.3em"></tspan></text>

  <!-- Check annotation -->
  <text x="185" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">all on real line</text>

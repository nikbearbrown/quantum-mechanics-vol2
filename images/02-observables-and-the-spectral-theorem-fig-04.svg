  <!-- Axis arrow -->
  <polygon points="316,226 324,230 316,234" fill="#545454"/>
  <!-- Zero tick -->
  <line x1="189" y1="224" x2="189" y2="236" stroke="#545454" stroke-width="0.75"/>
  <text x="189" y="248" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="middle">0</text>
  <text x="320" y="234" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">Re</text>

  <!-- Three eigenvalue dots on the real line -->

  <text x="447" y="268" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#C8102E">μ<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan></text>
  <text x="618" y="212" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#C8102E">μ<tspan dy="0.3em" font-size="0.75em">3</tspan><tspan dy="-0.3em"></tspan></text>


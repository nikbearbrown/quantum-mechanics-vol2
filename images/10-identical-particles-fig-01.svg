  <desc>Two-column taxonomy: particles with an even number of constituent fermions are bosons (photon, ⁴He, ⁸⁷Rb); particles with an odd count are fermions (electron, proton, ³He). Bosons tend to occupy the same state (BEC schematic); fermions obey Pauli exclusion (stacked levels).</desc>

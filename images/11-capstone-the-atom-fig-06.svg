  <desc>Line chart showing approximate 4s and 3d orbital energies (relative to E_4s at Z=19) as a function of atomic number Z across the first transition series (Z=19–29). The 3d orbital drops faster than 4s, crossing near Z=22. Vertical dashed lines mark the Madelung exceptions at Cr (Z=24) and Cu (Z=29). At the crossing, neither 4s nor 3d is clearly favored — enabling the exchange-energy exceptions.</desc>

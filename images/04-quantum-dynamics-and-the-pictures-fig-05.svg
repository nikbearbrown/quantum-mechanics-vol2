  <title id="fig-title-05">Ehrenfest's Theorem: Narrow vs. Wide Wavepacket in a Double-Well Potential</title>
  <desc>Two-panel comparison. Left: narrow Gaussian wavepacket at the central maximum of a quartic double-well potential — the expectation value of force matches the classical force, Ehrenfest's theorem holds. Right: wide bifurcated wavepacket with two lobes over each well minimum — the expectation value of position stays at the center while the probability density has split, illustrating Ehrenfest breakdown.</desc>

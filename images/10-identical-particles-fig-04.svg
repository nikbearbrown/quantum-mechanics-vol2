  <title id="fig-title-04">Helium Para/Ortho Energy Splitting: J and K Integrals</title>
  <desc>Vertical energy level diagram for helium 1s2s configuration. Unperturbed reference energy E⁽⁰⁾ shown as dashed baseline. Parahelium (singlet, S=0) at E⁽⁰⁾+J+K lies above orthohelium (triplet, S=1) at E⁽⁰⁾+J−K. Right-side brackets label J (direct Coulomb integral) and K (exchange integral). Total splitting 2K ≈ 0.80 eV.</desc>

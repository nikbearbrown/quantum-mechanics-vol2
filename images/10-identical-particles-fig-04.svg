  <polygon points="146,129 150,140 154,129" fill="#ADADAD"/>
  <!-- Spatial symmetry: smooth hump below -->
  <path d="M 126,162 Q 143,155 160,162" fill="none" stroke="#D4D4D4" stroke-width="1"/>
  <text x="143" y="175" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#D4D4D4" text-anchor="middle">ψ<tspan dy="0.3em" font-size="0.75em">+</tspan><tspan dy="-0.3em"></tspan></text>

  <!-- ==== Orthohelium level: E⁽⁰⁾ + J − K at y=245 ==== -->
  <!-- Ortho level at y=245: J-K region = 270-245=25px, J spans 145 to 220 (y) -->
  <line x1="164" y1="245" x2="390" y2="245" stroke="#ADADAD" stroke-width="2.5"/>

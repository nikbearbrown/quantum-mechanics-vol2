  <text x="118" y="234" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e" text-anchor="end">J</text>
  <text x="118" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#545454" text-anchor="end">direct</text>

  <!-- ==== K bracket: from midpoint (y=195) to para level (y=145) ==== -->
  <line x1="128" y1="148" x2="128" y2="192" stroke="#2a1a0e" stroke-width="1"/>
  <polygon points="124,152 128,143 132,152" fill="#2a1a0e"/>
  <polygon points="124,188 128,196 132,188" fill="#2a1a0e"/>
  <text x="118" y="172" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e" text-anchor="end">K</text>
  <text x="118" y="184" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#545454" text-anchor="end">exchange</text>


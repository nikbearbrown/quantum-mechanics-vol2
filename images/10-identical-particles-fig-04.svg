  <line x1="540" y1="148" x2="540" y2="242" stroke="#2a1a0e" stroke-width="1"/>
  <polygon points="536,152 540,143 544,152" fill="#2a1a0e"/>
  <polygon points="536,238 540,246 544,238" fill="#2a1a0e"/>
  <text x="548" y="197" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">2K</text>
  <text x="548" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">≈ 0.80 eV</text>

  <!-- Annotation: ortho lower because ψ− keeps electrons apart -->
  <rect x="116" y="294" width="430" height="46" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="331" y="313" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle" font-weight="600">Why orthohelium is lower</text>
  <text x="331" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">Antisymmetric spatial ψ<tspan dy="0.3em" font-size="0.75em">-</tspan><tspan dy="-0.3em"></tspan> → node at r<tspan dy="0.3em" font-size="0.75em">1</tspan><tspan dy="-0.3em"></tspan>=r<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan> → electrons avoid each other → lower Coulomb repulsion.</text>

  <!-- K annotation -->
  <text x="331" y="360" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">Exchange integral K = ∫∫ ψ<tspan dy="0.3em" font-size="0.75em">1</tspan><tspan dy="-0.3em"></tspan>s*(r<tspan dy="0.3em" font-size="0.75em">1</tspan><tspan dy="-0.3em"></tspan>)ψ<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan>s*(r<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan>) · e<tspan dy="-0.5em" font-size="0.75em">2</tspan><tspan dy="0.5em"></tspan>/|r<tspan dy="0.3em" font-size="0.75em">1</tspan><tspan dy="-0.3em"></tspan>−r<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan>| · ψ<tspan dy="0.3em" font-size="0.75em">1</tspan><tspan dy="-0.3em"></tspan>s(r<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan>)ψ<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan>s(r<tspan dy="0.3em" font-size="0.75em">1</tspan><tspan dy="-0.3em"></tspan>) dr<tspan dy="0.3em" font-size="0.75em">1</tspan><tspan dy="-0.3em"></tspan>dr<tspan dy="0.3em" font-size="0.75em">2</tspan><tspan dy="-0.3em"></tspan> has no classical analog.</text>

  <!-- Caption -->
  <text x="350" y="400" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">No spin-spin force involved: the energy difference is purely due to spatial wave-function symmetry class.</text>

  <text x="350" y="44" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">J = direct Coulomb integral. K = exchange integral (no classical analog). Splitting = 2K.</text>


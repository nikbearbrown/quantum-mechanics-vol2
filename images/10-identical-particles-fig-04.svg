  <text x="102" y="68" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="end">E</text>

  <!-- Unperturbed reference E⁽⁰⁾ dashed baseline at y=270 -->
  <line x1="110" y1="270" x2="620" y2="270" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="104" y="274" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454" text-anchor="end">E⁽<tspan dy="-0.5em" font-size="0.75em">0</tspan><tspan dy="0.5em"></tspan>⁾</text>
  <text x="530" y="266" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#D4D4D4">unperturbed 1s2s</text>

  <!-- ==== Parahelium level: E⁽⁰⁾ + J + K at y=145 ==== -->
  <!-- J+K region: 270−145=125px total. Set J=75px, K=50px (2K=100px, K=50) -->
  <!-- Para level at y=145: E⁽⁰⁾ + J + K -->
  <line x1="164" y1="145" x2="390" y2="145" stroke="#C8102E" stroke-width="2.5"/>
  <!-- Para label + spin icon -->
  <text x="395" y="141" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" font-weight="600">Parahelium</text>
  <text x="395" y="156" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#C8102E">singlet  S=0</text>
  <text x="395" y="171" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">E⁽<tspan dy="-0.5em" font-size="0.75em">0</tspan><tspan dy="0.5em"></tspan>⁾ + J + K</text>
  <!-- Anti-parallel spin arrows icon -->
  <line x1="136" y1="134" x2="136" y2="122" stroke="#ADADAD" stroke-width="2"/>
  <polygon points="132,125 136,114 140,125" fill="#ADADAD"/>

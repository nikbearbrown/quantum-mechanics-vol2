  <text x="395" y="256" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">triplet  S=1</text>
  <text x="395" y="271" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">E⁽<tspan dy="-0.5em" font-size="0.75em">0</tspan><tspan dy="0.5em"></tspan>⁾ + J − K</text>
  <!-- Parallel spin arrows icon -->
  <line x1="136" y1="233" x2="136" y2="221" stroke="#ADADAD" stroke-width="2"/>
  <polygon points="132,224 136,213 140,224" fill="#ADADAD"/>
  <line x1="150" y1="233" x2="150" y2="221" stroke="#ADADAD" stroke-width="2"/>
  <polygon points="146,224 150,213 154,224" fill="#ADADAD"/>
  <!-- Spatial symmetry: dip shape below -->
  <path d="M 126,262 Q 134,275 143,262 Q 152,275 160,262" fill="none" stroke="#D4D4D4" stroke-width="1"/>
  <text x="143" y="282" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="8" fill="#D4D4D4" text-anchor="middle">ψ<tspan dy="0.3em" font-size="0.75em">-</tspan><tspan dy="-0.3em"></tspan></text>

  <!-- ==== J bracket: from E⁽⁰⁾ (y=270) to midpoint between levels (y=195) ==== -->
  <!-- midpoint = (145+245)/2 = 195 -->
  <line x1="128" y1="195" x2="128" y2="270" stroke="#2a1a0e" stroke-width="1"/>

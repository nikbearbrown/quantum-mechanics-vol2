  <desc>Three-row flowchart, one row per Hund's rule. Rule 1: maximize total S → antisymmetric spatial wavefunction → electrons avoid each other → lowest Coulomb repulsion → lowest energy. Rule 2: maximize L (given S) → angular avoidance → lower energy. Rule 3: J = |L−S| (less than half-filled) or J = L+S (more than half-filled) → mechanism is spin-orbit coupling, flagged as deferred. Reliability decreases from Rule 1 to Rule 3.</desc>

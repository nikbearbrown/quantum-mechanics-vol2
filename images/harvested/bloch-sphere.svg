<svg role="img" aria-labelledby="t-bloch" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <title id="t-bloch">Spin-one-half and the Bloch sphere</title>
  <desc>A qubit state parameterized by polar angle theta and azimuth phi on the unit sphere, with the basis poles up and down and a highlighted state vector.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM VOL 2</provenance></metadata>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2a1a0e"/></marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#C8102E"/></marker>
  </defs>
  <rect x="0" y="0" width="560" height="400" fill="#FFFFFF"/>
  <text x="280" y="30" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">The Bloch sphere of a spin-½ state</text>

  <rect x="30" y="50" width="320" height="300" fill="#F5F5F5" stroke="#D4D4D4"/>
  <!-- sphere -->
  <circle cx="190" cy="200" r="115" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <ellipse cx="190" cy="200" rx="115" ry="36" fill="none" stroke="#787878" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- axes -->
  <line x1="190" y1="320" x2="190" y2="78" stroke="#787878" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="80" y1="245" x2="300" y2="158" stroke="#787878" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="120" y1="265" x2="265" y2="140" stroke="#787878" stroke-width="1" marker-end="url(#ar)"/>
  <text x="196" y="76" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">z</text>
  <text x="302" y="156" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">y</text>
  <text x="266" y="134" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">x</text>
  <!-- poles -->
  <text x="190" y="72" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">|↑⟩</text>
  <text x="190" y="338" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">|↓⟩</text>
  <!-- state vector (red, must-look) -->
  <line x1="190" y1="200" x2="258" y2="120" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arR)"/>
  <circle cx="190" cy="200" r="3" fill="#2a1a0e"/>
  <text x="262" y="116" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#C8102E">|ψ⟩</text>
  <!-- theta arc -->
  <path d="M190,150 A50,50 0 0,1 226,165" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="206" y="148" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">θ</text>
  <!-- phi arc on equator -->
  <path d="M250,210 A60,18 0 0,0 215,222" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <text x="238" y="232" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">φ</text>

  <!-- right: parametrization -->
  <rect x="365" y="50" width="165" height="300" fill="#F5F5F5" stroke="#D4D4D4"/>
  <text x="447" y="90" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">State on the sphere</text>
  <text x="378" y="135" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">|ψ⟩ =</text>
  <text x="378" y="160" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e"> cos(θ/2)|↑⟩</text>
  <text x="378" y="185" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e"> + e^{iφ}sin(θ/2)|↓⟩</text>
  <text x="378" y="230" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">θ ∈ [0, π]</text>
  <text x="378" y="252" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">φ ∈ [0, 2π)</text>
  <text x="378" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Global phase has</text>
  <text x="378" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">no physical effect.</text>
  <text x="378" y="330" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">Sₙ = (ℏ/2) n̂·σ⃗</text>

  
</svg>

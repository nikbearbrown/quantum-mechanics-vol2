<svg role="img" aria-labelledby="t-pictures" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <title id="t-pictures">Schrodinger, Heisenberg, and interaction pictures</title>
  <desc>Three formulations of quantum dynamics compared by what carries the time dependence: states, operators, or a split between the two.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM VOL 2</provenance></metadata>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2a1a0e"/></marker>
  </defs>
  <rect x="0" y="0" width="560" height="400" fill="#FFFFFF"/>
  <text x="280" y="30" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Where does the time dependence live?</text>

  <!-- three columns -->
  <!-- Schrodinger -->
  <rect x="30" y="55" width="160" height="290" fill="#F5F5F5" stroke="#D4D4D4"/>
  <text x="110" y="80" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Schrödinger</text>
  <text x="110" y="118" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">states evolve</text>
  <text x="110" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">operators fixed</text>
  <text x="110" y="178" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">|ψ(t)⟩ = Û(t)|ψ⟩</text>
  <text x="110" y="200" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">Â_S fixed</text>
  <!-- rotating state arrow, static axis -->
  <line x1="60" y1="300" x2="160" y2="300" stroke="#787878" stroke-width="1"/>
  <line x1="110" y1="300" x2="150" y2="245" stroke="#C8102E" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="110" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">vector turns</text>

  <!-- Heisenberg -->
  <rect x="200" y="55" width="160" height="290" fill="#F5F5F5" stroke="#D4D4D4"/>
  <text x="280" y="80" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Heisenberg</text>
  <text x="280" y="118" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">states fixed</text>
  <text x="280" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">operators evolve</text>
  <text x="280" y="178" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">|ψ⟩ fixed</text>
  <text x="280" y="200" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#2a1a0e">Â_H = Û†Â_S Û</text>
  <!-- static state, rotating axis -->
  <line x1="280" y1="300" x2="320" y2="245" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="240" y1="320" x2="320" y2="288" stroke="#787878" stroke-width="1" marker-end="url(#ar)"/>
  <text x="280" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">frame turns</text>

  <!-- Interaction -->
  <rect x="370" y="55" width="160" height="290" fill="#F5F5F5" stroke="#D4D4D4"/>
  <text x="450" y="80" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Interaction</text>
  <text x="450" y="118" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">split: H₀ + V</text>
  <text x="450" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">both evolve</text>
  <text x="450" y="178" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#2a1a0e">ops by H₀</text>
  <text x="450" y="200" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#2a1a0e">states by V</text>
  <line x1="400" y1="300" x2="500" y2="300" stroke="#787878" stroke-width="1"/>
  <line x1="450" y1="300" x2="482" y2="258" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="450" y1="300" x2="420" y2="262" stroke="#787878" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="450" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">both turn</text>

  <text x="280" y="372" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">All agree on observables: ⟨Â⟩(t)</text>
  
</svg>

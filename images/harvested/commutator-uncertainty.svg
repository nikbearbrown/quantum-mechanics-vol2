<svg role="img" aria-labelledby="t-commut" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <title id="t-commut">Commutator and the generalized uncertainty relation</title>
  <desc>The non-zero commutator of two observables sets a lower bound on the product of their standard deviations; illustrated with the position-momentum case and reciprocal spreads.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM VOL 2</provenance></metadata>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2a1a0e"/></marker>
  </defs>
  <rect x="0" y="0" width="560" height="400" fill="#FFFFFF"/>
  <text x="280" y="30" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Commutators bound joint uncertainty</text>

  <rect x="40" y="50" width="480" height="64" fill="#F5F5F5" stroke="#D4D4D4"/>
  <text x="280" y="80" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13" fill="#2a1a0e">σ_A · σ_B  ≥  ½ |⟨[Â, B̂]⟩|</text>
  <text x="280" y="102" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">generalized uncertainty relation (Robertson)</text>

  <text x="280" y="142" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">[x̂, p̂] = iℏ   ⇒   σ_x · σ_p ≥ ℏ/2</text>

  <!-- two reciprocal distributions -->
  <!-- narrow position, wide momentum -->
  <rect x="60" y="170" width="200" height="180" fill="#F5F5F5" stroke="#D4D4D4"/>
  <text x="160" y="190" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">localized in x</text>
  <line x1="80" y1="320" x2="245" y2="320" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="80" y1="320" x2="80" y2="205" stroke="#2a1a0e" stroke-width="1"/>
  <path d="M90,320 C140,320 145,210 160,210 C175,210 180,320 230,320" fill="none" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="240" y="335" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">|ψ(x)|²</text>
  <line x1="148" y1="300" x2="172" y2="300" stroke="#787878" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="172" y1="300" x2="148" y2="300" stroke="#787878" stroke-width="1" marker-end="url(#ar)"/>
  <text x="74" y="240" text-anchor="start" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">σ_x small</text>

  <!-- wide momentum -->
  <rect x="300" y="170" width="200" height="180" fill="#F5F5F5" stroke="#D4D4D4"/>
  <text x="400" y="190" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">spread in p</text>
  <line x1="320" y1="320" x2="485" y2="320" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="320" y1="320" x2="320" y2="205" stroke="#2a1a0e" stroke-width="1"/>
  <path d="M325,318 C360,316 372,250 400,250 C428,250 440,316 478,318" fill="none" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="480" y="335" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">|φ(p)|²</text>
  <line x1="358" y1="300" x2="442" y2="300" stroke="#787878" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="442" y1="300" x2="358" y2="300" stroke="#787878" stroke-width="1" marker-end="url(#ar)"/>
  <text x="400" y="292" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">σ_p large</text>

  
</svg>

<svg role="img" aria-labelledby="t-sg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <title id="t-sg">Stern-Gerlach experiment</title>
  <desc>A beam of silver atoms passes through an inhomogeneous magnetic field and splits into exactly two discrete beams, spin up and spin down, instead of a classical continuous smear.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM VOL 2</provenance></metadata>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2a1a0e"/></marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#C8102E"/></marker>
  </defs>
  <rect x="0" y="0" width="560" height="400" fill="#FFFFFF"/>
  <text x="280" y="30" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Stern–Gerlach: two spots, every axis</text>

  <rect x="30" y="50" width="500" height="300" fill="#F5F5F5" stroke="#D4D4D4"/>

  <!-- source -->
  <rect x="55" y="190" width="40" height="40" fill="#ADADAD" stroke="#2a1a0e" stroke-width="1"/>
  <text x="75" y="248" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">oven (Ag)</text>

  <!-- collimated beam -->
  <line x1="95" y1="210" x2="220" y2="210" stroke="#2a1a0e" stroke-width="1.5"/>

  <!-- magnet poles -->
  <path d="M225,150 L320,150 L320,180 L260,185 Z" fill="#ADADAD" fill-opacity="0.5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="272" y="170" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">N</text>
  <rect x="225" y="235" width="95" height="30" fill="#ADADAD" fill-opacity="0.3" stroke="#2a1a0e" stroke-width="1"/>
  <text x="272" y="255" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">S</text>
  <text x="272" y="300" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">∂B/∂z ≠ 0</text>

  <!-- split beams -->
  <line x1="320" y1="210" x2="455" y2="150" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arR)"/>
  <line x1="320" y1="210" x2="455" y2="270" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="350" y="142" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#C8102E">|↑⟩  +ℏ/2</text>
  <text x="350" y="295" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">|↓⟩  −ℏ/2</text>

  <!-- detector plate -->
  <rect x="465" y="120" width="14" height="170" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <circle cx="472" cy="150" r="6" fill="#2a1a0e"/>
  <circle cx="472" cy="270" r="6" fill="#2a1a0e"/>
  <text x="498" y="210" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" transform="rotate(90 498 210)">detector</text>

  <!-- classical prediction inset -->
  <text x="160" y="330" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">classical: continuous smear (not observed)</text>
  <line x1="100" y1="340" x2="100" y2="312" stroke="#787878" stroke-width="6" stroke-opacity="0.25"/>

  
</svg>

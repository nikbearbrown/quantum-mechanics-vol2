<svg role="img" aria-labelledby="t-hilbert" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <title id="t-hilbert">State vector in Hilbert space</title>
  <desc>A state vector |psi&gt; drawn in a Hilbert space spanned by orthonormal basis kets, decomposed into components c1, c2, c3 along the basis directions.</desc>
  <metadata><provenance>CANDIDATE · CAJAL PALETTE · QM VOL 2</provenance></metadata>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#2a1a0e"/></marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#C8102E"/></marker>
    <marker id="arg" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#787878"/></marker>
  </defs>
  <rect x="0" y="0" width="560" height="400" fill="#FFFFFF"/>
  <text x="280" y="30" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">A state is a vector in Hilbert space</text>
  <rect x="40" y="50" width="340" height="300" fill="#F5F5F5" stroke="#D4D4D4"/>

  <!-- origin -->
  <g>
    <!-- three basis axes from origin (210,300) -->
    <line x1="210" y1="300" x2="210" y2="90" stroke="#787878" stroke-width="1.5" marker-end="url(#arg)"/>
    <line x1="210" y1="300" x2="80" y2="330" stroke="#787878" stroke-width="1.5" marker-end="url(#arg)"/>
    <line x1="210" y1="300" x2="360" y2="240" stroke="#787878" stroke-width="1.5" marker-end="url(#arg)"/>
    <text x="216" y="86" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">|e₁⟩</text>
    <text x="60" y="345" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">|e₂⟩</text>
    <text x="332" y="232" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">|e₃⟩</text>

    <!-- the state vector (red, the must-look element) -->
    <line x1="210" y1="300" x2="300" y2="150" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arR)"/>
    <text x="304" y="146" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13" fill="#C8102E">|ψ⟩</text>

    <!-- component projections (dashed) -->
    <line x1="210" y1="300" x2="210" y2="180" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="210" y1="180" x2="300" y2="150" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="180" y="240" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">c₁</text>
    <text x="250" y="172" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">c₃</text>
    <circle cx="210" cy="300" r="3" fill="#2a1a0e"/>
  </g>

  <!-- right column: the decomposition -->
  <text x="400" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Basis decomposition</text>
  <text x="400" y="150" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">|ψ⟩ = Σ cₙ|eₙ⟩</text>
  <text x="400" y="186" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Coefficients</text>
  <text x="400" y="214" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">cₙ = ⟨eₙ|ψ⟩</text>
  <text x="400" y="250" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Normalization</text>
  <text x="400" y="278" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" fill="#2a1a0e">Σ |cₙ|² = 1</text>
  <text x="400" y="314" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Orthonormal basis:</text>
  <text x="400" y="334" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">⟨eₘ|eₙ⟩ = δₘₙ</text>

  
</svg>

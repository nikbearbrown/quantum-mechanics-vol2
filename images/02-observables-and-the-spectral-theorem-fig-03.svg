  <!-- Pair 1 in A†: (1,0) upper = (0,1) in A after conjugate-transpose
       In A†: row j, col i = (A_ij)*
       (0,1) in A → in A†: position (1,0) upper triangle? No:
       A† means (A†)_ij = (A_ji)*
       So (A†)_(0,1) = (A_(1,0))* — this swaps and conjugates.
       So pair (0,1) of A ↔ (1,0) of A†? No, (A†)_(0,1) = (A_(1,0))*.
       Visually: A's upper-triangle cell (row0,col1) pairs with A†'s lower-triangle cell (row1,col0).
       In A†: (row1,col0) = (A_(0,1))* — same pair, just shown in mirror position with * marker. -->

  <!-- In A†: (1,0) is lower triangle → same ink color as A's (0,1) upper -->
